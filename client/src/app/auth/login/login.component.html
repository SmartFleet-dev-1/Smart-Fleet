<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Login</h2>
    <p>Access your Smart Fleet Pro account</p>

    <div *ngIf="errorMessage" class="error-box">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="success-box">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          placeholder="Enter username"
          [disabled]="isLoginLocked"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter password"
          [disabled]="isLoginLocked"
        />
      </div>

      <div class="captcha-box">
        <label>Captcha</label>

        <div class="captcha-question">
          <span *ngIf="!captchaLoading && captchaQuestion">
            {{ captchaQuestion }}
          </span>

          <span *ngIf="captchaLoading">
            Loading captcha...
          </span>

          <span *ngIf="!captchaLoading && !captchaQuestion">
            Captcha not loaded
          </span>

          <button
            type="button"
            class="refresh-btn"
            (click)="loadCaptcha()"
            [disabled]="captchaLoading || isLoginLocked"
          >
            Refresh
          </button>
        </div>

        <input
          type="text"
          name="captchaAnswer"
          [(ngModel)]="captchaAnswer"
          placeholder="Enter captcha answer"
          [disabled]="isLoginLocked"
        />
      </div>

      <button
        type="submit"
        class="primary-btn"
        [disabled]="loading || captchaLoading || isLoginLocked"
      >
        <span *ngIf="!isLoginLocked">
          {{ loading ? 'Logging in...' : 'Login' }}
        </span>

        <span *ngIf="isLoginLocked">
          Locked {{ lockCountdown }}
        </span>
      </button>

      <button
        type="button"
        class="secondary-btn"
        (click)="resetForm()"
        [disabled]="isLoginLocked"
      >
        Reset
      </button>
    </form>

    <p class="bottom-text">
      New user?
      <a routerLink="/register">Register</a>
    </p>

    <p class="bottom-text">
      <a routerLink="/forgot-password">Forgot Password?</a>
    </p>
  </div>
</div>
