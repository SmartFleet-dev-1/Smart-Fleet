<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Register</h2>
    <p>Create your Smart Fleet Pro account</p>

    <div *ngIf="errorMessage" class="error-box">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="success-box">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="register()">
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          placeholder="Enter username"
        />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Enter email"
        />
      </div>

      <div class="form-group">
        <label>Contact Number</label>
        <input
          type="number"
          name="contactNumber"
          [(ngModel)]="contactNumber"
          placeholder="Enter contact number"
        />
      </div>

      <div class="form-group">
        <label>Role</label>
        <select
          name="role"
          [(ngModel)]="role"
          required
        >
          <option *ngFor="let r of roles" [value]="r">
            {{ r }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter password"
        />
      </div>

      <button type="submit" class="primary-btn" [disabled]="loading">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>

      <button type="button" class="secondary-btn" (click)="resetForm()">
        Reset
      </button>
    </form>

    <p class="bottom-text">
      Already registered?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
